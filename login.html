<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <!--navbar-->
    <nav class="navbar bg-primary navbar-dark shadow sticky-top">
        <div class="container-fluid">
            <a href="index.html" class="navbar-brand">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-bank"
                    viewBox="0 0 16 16">
                    <path
                        d="m8 0 6.61 3h.89a.5.5 0 0 1 .5.5v2a.5.5 0 0 1-.5.5H15v7a.5.5 0 0 1 .485.38l.5 2a.498.498 0 0 1-.485.62H.5a.498.498 0 0 1-.485-.62l.5-2A.5.5 0 0 1 1 13V6H.5a.5.5 0 0 1-.5-.5v-2A.5.5 0 0 1 .5 3h.89zM3.777 3h8.447L8 1zM2 6v7h1V6zm2 0v7h2.5V6zm3.5 0v7h1V6zm2 0v7H12V6zM13 6v7h1V6zm2-1V4H1v1zm-.39 9H1.39l-.25 1h13.72z" />
                </svg>
            </a>


            <div>

                <a href="register.html" class="btn btn-light">Register</a>
                <a href="login.html" class="btn btn-light">sign in</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center ">
            <div class="col-12 col-sm-8 col-md-6 col-lg-4">
                <div class="card shadow bg-primary">
                    <div class="card-body">
                        <h3 class="text-center mb-4">log in</h3>

                        <form>
                            <div class="mb-1">
                                <label class="form-label">username</label>
                                <input type="text" class="form-control" placeholder="enter username">
                            </div>

                            <div class="mb-2">
                                <label class="form-label">password</label>
                                <input type="password" class="form-control" placeholder="enter password">
                            </div>

                            <div class="d-flex justify-content-between mt-3">

                                <button type="submit" class="btn btn-light shadow">register</button>

                                <a href="Dashboard.html" class="btn btn-light shadow" data-bs-toggle="popover" data-bs-trigger="hover focus" title="click to enter students detail card">
                                    Login
                                </a>
                            </div>
                        </form>

                    </div>

                </div>

            </div>

        </div>

    </div>




    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
